<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Спасибо — Римма Сабитова</title>
<link rel="icon" type="image/svg+xml" href="img/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#F6F4EE;--surface:#FFFFFF;--text:#2C322C;--muted:#6B7268;--green:#4F7A5B;--line:rgba(79,122,91,.18)}
  body{font-family:'Jost',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
  .card{max-width:520px;text-align:center;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:3rem 2.2rem}
  .mark{width:64px;height:64px;border-radius:50%;background:rgba(79,122,91,.12);color:var(--green);display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto 1.4rem}
  h1{font-family:'Cormorant Garamond',serif;font-weight:400;font-size:2rem;line-height:1.15;margin-bottom:.8rem}
  p{font-size:.98rem;color:var(--muted);line-height:1.7;margin-bottom:1.8rem}
  .btn{display:inline-block;background:var(--green);color:#fff;text-decoration:none;padding:.85rem 1.8rem;border-radius:8px;font-size:.85rem;letter-spacing:.06em;text-transform:uppercase}
  .btn:hover{opacity:.9}
</style>
</head>
<body>
  <div class="card">
    <div class="mark">✓</div>
    <h1>Спасибо!</h1>
    <p>Ваша заявка принята. Если вы оплатили — платёж получен. Я свяжусь с вами в течение 24 часов для подтверждения деталей консультации.</p>
    <a class="btn" href="index.html">На главную</a>
  </div>
</body>
</html>
