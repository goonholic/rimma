<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Оплата не завершена — Римма Сабитова</title>
<link rel="icon" type="image/svg+xml" href="img/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#F6F4EE;--surface:#FFFFFF;--text:#2C322C;--muted:#6B7268;--green:#4F7A5B;--line:rgba(79,122,91,.18)}
  body{font-family:'Jost',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
  .card{max-width:520px;text-align:center;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:3rem 2.2rem}
  .mark{width:64px;height:64px;border-radius:50%;background:rgba(120,90,70,.12);color:#9b6a4a;display:flex;align-items:center;justify-content:center;font-size:1.9rem;margin:0 auto 1.4rem}
  h1{font-family:'Cormorant Garamond',serif;font-weight:400;font-size:2rem;line-height:1.15;margin-bottom:.8rem}
  p{font-size:.98rem;color:var(--muted);line-height:1.7;margin-bottom:1.8rem}
  .row{display:flex;gap:.7rem;justify-content:center;flex-wrap:wrap}
  .btn{display:inline-block;text-decoration:none;padding:.85rem 1.6rem;border-radius:8px;font-size:.82rem;letter-spacing:.06em;text-transform:uppercase}
  .btn.primary{background:var(--green);color:#fff}
  .btn.ghost{border:1px solid var(--line);color:var(--text)}
  .btn:hover{opacity:.9}
</style>
</head>
<body>
  <div class="card">
    <div class="mark">!</div>
    <h1>Оплата не завершена</h1>
    <p>Похоже, платёж был отменён или не прошёл. Ничего страшного — ваша заявка уже у меня, и я свяжусь с вами. Можно попробовать оплатить ещё раз или написать мне напрямую.</p>
    <div class="row">
      <a class="btn primary" href="index.html#contact">Вернуться к записи</a>
      <a class="btn ghost" href="https://vk.com/sabitova_ri" target="_blank" rel="noopener">Написать в ВК</a>
    </div>
  </div>
</body>
</html>
